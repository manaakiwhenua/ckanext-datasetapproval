<!-- Rejection Details -->
<fieldset class="mb-3">
  <legend>Rejection Decision</legend>

  <label class="form-label">Rejection Reasons</label>
  <div id="rejection_reason_checkbox_parent">
  {% for key, label in h.get_vocab_group("rejection_reasons").items() %}
      <div class="form-check">
        <input
          class="form-check-input"
          type="checkbox"
          name="rejection_reasons"
          id="rejection_reasons_{{ key }}"
          value="{{ key }}"
        >
        <label class="form-check-label multi-select-reasons" for="rejection_reasons_{{ key }}">
          {{ _(label) }}
        </label>
      </div>
      {% endfor %}
  </div>

  <label for="rejection_reason_comments" class="form-label mt-2">Brief Description (max 1000 characters)</label>
  <textarea 
    id="rejection_reason_comments" 
    name="rejection_reason_comments" 
    class="form-control" 
    rows="3" 
    maxlength="1000" 
    required
    ondrop="return false;"
    placeholder="{% trans %}Why dataset cannot be published...{% endtrans %}"></textarea>
</fieldset>

<!-- Resubmission -->
<fieldset class="mb-3">
  <legend>Resubmission</legend>
  <label for="resubmission_comments" class="form-label mt-2">Actions Required (max 1000 characters)</label>
  <textarea id="resubmission_comments" name="resubmission_comments" class="form-control" rows="4" maxlength="1000" required></textarea>
</fieldset>
