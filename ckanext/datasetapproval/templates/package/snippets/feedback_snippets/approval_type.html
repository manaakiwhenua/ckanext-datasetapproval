<label class="form-label mt-2">Approval Type</label>
<select name="approval_type" class="form-control">
    <option value="">{% trans %}Select type{% endtrans %}</option>
    {% for key, label in approval_types %}
        <option value="{{ key }}">{{ _(label) }}</option>
    {% endfor %}
</select>
<span><i>If no approval obtained, please contact the Datastore Administrator and outline why no approval is needed.</i></span>
