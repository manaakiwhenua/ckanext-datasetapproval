<!-- Approval -->
 <fieldset class="mb-3">
    <legend>Approval Decision</legend>
    <div class="form-group control-medium">
        <label class="form-label mt-2">Approval Outcome</label>
        <select name="approval_outcome" class="form-control" required aria-describedby="approval-outcome-help">
            <option value="">{% trans %}Select status{% endtrans %}</option>
            {% for key, label in h.get_vocab_group("approval_outcome").items() %}
                <option value="{{ key }}">{{ _(label) }}</option>
            {% endfor %}
        </select>
        <div name="approval-outcome-help" class="info-block"><i class="fa fa-info-circle"></i>
            <span class="approval-outcome-help-text">These outcomes do not result in functional changes to the dataset status.</span>
        </div>

    <label for="approval_outcome_comments" class="form-label mt-2">{% trans %}Add any comments regarding the approval below (max 1000 characters){% endtrans %}</label>
    <textarea 
        id="approval_outcome_comments" 
        name="approval_outcome_comments" 
        class="form-control" 
        rows="3" 
        maxlength="1000" 
        ondrop="return false;"
        placeholder="{% trans %}Comments here will be sent to the dataset editor...{% endtrans %}"></textarea>
    </fieldset>

    <fieldset class="mb-3 d-none approval-conditions">
        <legend>Approval Conditions</legend>
        <div class="form-group control-medium">
            <label for="approval_conditions_comments" class="form-label mt-2">Conditions</label>
            <textarea 
                id="approval_conditions_comments" 
                name="approval_conditions_comments" 
                class="form-control" 
                rows="4" 
                maxlength="1000" 
                ondrop="return false;"
                placeholder="{% trans %}Enter approval conditions here...{% endtrans %}"></textarea>

            <label for="condition_expiry_date" class="form-label mt-2">Condition Expiry Date</label>
            <input type="date" name="condition_expiry_date" class="form-control" aria-describedby="condition-date-help">
            <div name="condition-date-help" class="info-block"><i class="fa fa-info-circle"></i> Reminder date to review dataset conditions (no automatic changes).</span>
        </div>
    </fieldset>
