<!-- Compliance & Approval -->
 <fieldset class="mb-3">
    <legend>Approval Decision</legend>

    <label class="form-label">Compliance Status</label>
    <select name="compliance_status" class="form-control" required>
        <option value="">{% trans %}Select status{% endtrans %}</option>
        {% for key, label in h.get_vocab_group("compliance_status").items() %}
            {% if key != "non_compliant" %}
                <option value="{{ key }}">{{ _(label) }}</option>
            {% endif %}
        {% endfor %}
    </select>

    <label class="form-label mt-2">Approval Outcome</label>
    <select name="approval_outcome" class="form-control" required>
        <option value="">{% trans %}Select status{% endtrans %}</option>
        {% for key, label in h.get_vocab_group("approval_outcome").items() %}
            <option value="{{ key }}">{{ _(label) }}</option>
        {% endfor %}
    </select>

    <label for="approval_details" class="form-label mt-2">{% trans %}Add any comments regarding the approval below (max 1000 characters){% endtrans %}</label>
    <textarea 
        id="approval_details" 
        name="approval_details" 
        class="form-control" 
        rows="3" 
        maxlength="1000" 
        ondrop="return false;"
        placeholder="{% trans %}Comments here will be sent to the dataset editor...{% endtrans %}"></textarea>
    </fieldset>

    <fieldset class="mb-3 d-none approval-conditions">
        <legend>Approval Conditions</legend>
        
        <label for="approval_outcome_comments" class="form-label mt-2">Conditions</label>
        <textarea 
            id="approval_outcome_comments" 
            name="approval_outcome_comments" 
            class="form-control" 
            rows="4" 
            maxlength="1000" 
            ondrop="return false;"
            placeholder="{% trans %}Enter approval conditions here...{% endtrans %}"></textarea>

        <label for="condition_expiry_date" class="form-label mt-2">Condition Expiry Date</label>
        <input type="date" name="condition_expiry_date" class="form-control">
    </fieldset>
