<!-- Review Type -->
<label class="form-label mt-2">Review Type</label>
<select name="review_type" class="form-control" required>
    <option value="">{% trans %}Select reason{% endtrans %}</option>
    {% for key, label in review_types %}
        <option value="{{ key }}">{{ _(label) }}</option>
    {% endfor %}
</select>
<span><i>If no review has been undertaken, please contact the Datastore Administrator and outline why no review has been done.</i></span>
